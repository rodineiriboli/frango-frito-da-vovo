services:
  postgres:
    image: postgres:16-alpine
    container_name: frango-frito-postgres
    environment:
      POSTGRES_DB: frango_frito_da_vovo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frango_frito_da_vovo"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/src/FrangoFrito.Api/Dockerfile
    container_name: frango-frito-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=frango_frito_da_vovo;Username=postgres;Password=postgres
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    container_name: frango-frito-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
